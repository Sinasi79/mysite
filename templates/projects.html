{% extends 'base.html' %}
{% load static %}

{% block content %}
	<article id="portfolio" class="wrapper style3">
		<div class="container">
			<header>
				<h2>Here is my Latest Project</h2>
				
			</header>
			<div class="row">
				{% for post in posts %}
				<div class="col-12">
					<article class="box style2">
						<a href="#" class="image featured"><img src="{% static 'images/diabetes.jpg' %}" alt="" /></a>
						<h3><a href="#">{{post.title}}</a></h3>
						<p>{{post.content}}</p>
						<small>{{post.published_date}}</small>
					</article>
				</div>
				{% endfor %}
			</div>
		</div>
	</article>
{% endblock %}
